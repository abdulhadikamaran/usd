<!DOCTYPE html>
<html lang="ku" dir="rtl" class="dark">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>نرخی دۆلار — Erbil Dollar Rate</title>
    <meta name="description" content="Live Erbil USD/IQD exchange rate with offline support and currency converter" />
    <meta name="theme-color" content="#0f1923" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f7f6" media="(prefers-color-scheme: light)" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind CDN -->
    <script src="/static/js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f0b428",
                        "primary-dark": "#dca31d",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0f1923",
                        "surface-dark": "#1a242f",
                        "accent-green": "#22c55e",
                        "accent-red": "#ef4444",
                        "text-muted": "#94a3b8",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(26, 36, 47, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        html:not(.dark) .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .glow-effect {
            box-shadow: 0 0 40px -10px rgba(240, 180, 40, 0.15);
        }

        html:not(.dark) .glow-effect {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Smooth page transitions */
        .page-transition {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        /* Number input hide arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display antialiased h-[100dvh] w-screen flex flex-col overflow-hidden text-slate-900 dark:text-slate-100 selection:bg-primary/30">

    <!-- ═══ PAGE: HOME ═══ -->
    <div id="page-home" class="flex-1 flex flex-col h-full min-h-0 overflow-hidden">

        <!-- Header -->
        <header
            class="shrink-0 z-50 flex items-center justify-between px-6 pt-10 pb-2 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white" data-i18n="app_name">نرخی
                    دۆلار</h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle"
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200 dark:bg-white/10 hover:bg-slate-300 dark:hover:bg-white/20 transition-colors"
                    title="Toggle theme">
                    <span
                        class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-[20px] dark:hidden">dark_mode</span>
                    <span
                        class="material-symbols-outlined text-slate-300 text-[20px] hidden dark:inline">light_mode</span>
                </button>
                <button id="lang-toggle"
                    class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-200 dark:bg-white/10 hover:bg-slate-300 dark:hover:bg-white/20 transition-colors"
                    title="Switch language">
                    <img id="lang-flag" src="/static/flags/us.svg" alt="Language"
                        class="w-6 h-4 rounded-sm object-cover shadow-sm">
                </button>
            </div>
        </header>

        <!-- Main Content (scrollable if needed, clears footer) -->
        <main
            class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 overflow-hidden pb-[80px]">

            <!-- Rate Display -->
            <div class="w-full flex flex-col items-center mb-5">
                <div class="flex items-center gap-2 mb-2">
                    <span
                        class="px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-xs font-medium"
                        data-i18n="live_market">بازاڕی ڕاستەوخۆ</span>
                </div>
                <h1 id="main-rate" class="text-5xl font-bold text-slate-900 dark:text-white tracking-tight mb-2">---
                </h1>
                <div class="flex items-center gap-2 mb-4">
                    <p id="rate-per-100" class="text-slate-500 dark:text-slate-400 text-base font-medium"
                        data-i18n="per_100">IQD بۆ $100</p>
                    <span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600"></span>
                    <div data-diff-container
                        class="flex items-center text-accent-green text-sm font-semibold bg-green-500/10 px-2 py-0.5 rounded border border-green-500/20">
                        <span id="rate-diff-icon" class="material-symbols-outlined text-base mr-0.5">trending_up</span>
                        <span id="rate-diff">+0</span>
                    </div>
                </div>
                <p id="rate-updated" class="text-xs text-slate-400 dark:text-slate-500 font-medium"
                    data-i18n="updated_just">ئێستا نوێکراوەتەوە</p>
            </div>

            <!-- Converter Card -->
            <div class="w-full glass-panel glow-effect rounded-2xl p-4 relative flex flex-col gap-2">
                <!-- USD Input -->
                <div id="usd-container" style="order: 1"
                    class="bg-slate-100 dark:bg-black/20 rounded-xl p-4 mb-1 border border-transparent focus-within:border-primary/50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span
                            class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">USD</span>
                        <div class="flex items-center gap-1.5">
                            <img src="/static/flags/us.svg" alt="US" class="w-6 h-4 rounded-sm shadow-sm" />
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300"
                                data-i18n="convert">گۆڕین</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 relative">
                        <span class="text-2xl font-medium text-slate-400 pointer-events-none">$</span>
                        <input id="usd-input"
                            class="w-full bg-transparent border-none p-0 text-3xl font-bold text-slate-900 dark:text-white focus:ring-0 focus:outline-none placeholder-slate-600 ltr:pr-8 rtl:pl-8"
                            placeholder="0" type="text" value="100" />
                        <button id="usd-clear"
                            class="hidden absolute ltr:right-0 rtl:left-0 top-1/2 -translate-y-1/2 p-2 px-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                            <span class="material-symbols-outlined text-xl">close</span>
                        </button>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
                    <button id="swap-btn"
                        class="flex items-center justify-center w-12 h-12 rounded-full bg-primary shadow-lg shadow-primary/20 border-4 border-background-light dark:border-surface-dark hover:scale-105 active:scale-95 transition-transform group">
                        <span
                            class="material-symbols-outlined text-background-dark font-bold transition-transform duration-300">swap_vert</span>
                    </button>
                </div>

                <!-- IQD Output -->
                <div id="iqd-container" style="order: 2"
                    class="bg-slate-100 dark:bg-black/20 rounded-xl p-4 mt-1 border border-transparent focus-within:border-primary/50 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <span
                            class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">IQD</span>
                        <div class="flex items-center gap-1.5">
                            <img src="/static/flags/iq.svg" alt="IQ" class="w-6 h-4 rounded-sm shadow-sm" />
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300">IQD</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 relative">
                        <input id="iqd-input"
                            class="w-full bg-transparent border-none p-0 text-3xl font-bold text-primary focus:ring-0 focus:outline-none placeholder-slate-600 ltr:pr-8 rtl:pl-8 pointer-events-none"
                            placeholder="0" type="text" value="0" readonly />
                        <button id="iqd-clear"
                            class="hidden absolute ltr:right-0 rtl:left-0 top-1/2 -translate-y-1/2 p-2 px-3 text-primary hover:text-primary/80">
                            <span class="material-symbols-outlined text-xl">close</span>
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ═══ PAGE: ANALYTICS ═══ -->
    <div id="page-analytics" class="hidden flex-1 flex flex-col h-full min-h-0 overflow-hidden">

        <!-- Analytics Header -->
        <header
            class="shrink-0 z-20 flex items-center justify-between px-4 pt-10 pb-2 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md">
            <button id="analytics-back"
                class="p-2 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-white/5 transition-colors">
                <span class="material-symbols-outlined text-slate-700 dark:text-slate-200"
                    style="font-size: 24px;">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold text-center flex-1" data-i18n="history">مێژوو</h1>
            <div class="w-10"></div>
        </header>

        <!-- Analytics Content -->
        <main class="flex-1 overflow-y-auto w-full max-w-md mx-auto px-4 py-2 pb-[80px]">

            <section class="flex flex-col gap-3 min-h-full">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-lg font-bold" data-i18n="history">مێژوو</h2>
                    <div class="flex bg-slate-100 dark:bg-slate-800/50 rounded-lg p-1 gap-1">
                        <button data-history-tab="1"
                            class="px-3 py-1.5 text-xs font-semibold rounded bg-white dark:bg-primary text-slate-900 dark:text-background-dark shadow-sm"
                            data-i18n="days_1">١ ڕۆژ</button>
                        <button data-history-tab="7"
                            class="px-3 py-1.5 text-xs font-semibold rounded text-slate-500 dark:text-text-muted hover:text-slate-900 dark:hover:text-white transition-colors"
                            data-i18n="days_7">٧ ڕۆژ</button>
                        <button data-history-tab="30"
                            class="px-3 py-1.5 text-xs font-semibold rounded text-slate-500 dark:text-text-muted hover:text-slate-900 dark:hover:text-white transition-colors"
                            data-i18n="days_30">٣٠ ڕۆژ</button>
                        <button data-history-tab="90"
                            class="px-3 py-1.5 text-xs font-semibold rounded text-slate-500 dark:text-text-muted hover:text-slate-900 dark:hover:text-white transition-colors"
                            data-i18n="days_90">٩٠ ڕۆژ</button>
                    </div>
                </div>

                <!-- History Chart Card -->
                <div
                    class="relative bg-white/50 dark:bg-surface-dark/60 backdrop-blur-xl rounded-2xl p-4 border border-slate-200 dark:border-white/5 shadow-sm overflow-hidden flex flex-col">
                    <div
                        class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-3xl pointer-events-none">
                    </div>
                    <div class="flex justify-between items-end mb-3">
                        <div>
                            <span id="history-high-label"
                                class="text-xs text-slate-500 dark:text-text-muted font-medium block mb-1"
                                data-i18n="daily_high">بەرزترین ئەمڕۆ</span>
                            <span id="history-high" class="text-lg font-bold text-slate-900 dark:text-white">---</span>
                        </div>
                        <div class="text-right">
                            <span id="history-low-label"
                                class="text-xs text-slate-500 dark:text-text-muted font-medium block mb-1"
                                data-i18n="daily_low">نزمترین ئەمڕۆ</span>
                            <span id="history-low" class="text-lg font-bold text-slate-900 dark:text-white">---</span>
                        </div>
                    </div>
                    <!-- Chart with Y-axis -->
                    <div class="flex gap-0 w-full" dir="ltr">
                        <!-- Y-axis price labels -->
                        <div id="history-y-axis" class="flex flex-col justify-between items-end pr-2 py-1 shrink-0"
                            style="width: 52px;">
                            <span
                                class="text-[10px] font-medium text-slate-400 dark:text-slate-500 leading-none">---</span>
                            <span
                                class="text-[10px] font-medium text-slate-400 dark:text-slate-500 leading-none">---</span>
                            <span
                                class="text-[10px] font-medium text-slate-400 dark:text-slate-500 leading-none">---</span>
                        </div>
                        <!-- Chart area -->
                        <div class="flex-1 min-w-0 flex flex-col">
                            <div id="history-chart" class="relative h-[200px] w-full">
                                <p class="text-center text-slate-400 py-12">Loading...</p>
                            </div>
                            <div id="history-labels"
                                class="relative h-5 mt-2 text-[10px] font-medium text-slate-400 dark:text-text-muted shrink-0 w-full">
                            </div>
                        </div>
                    </div>
                    <!-- 7-Day Drilldown -->
                    <div id="hourly-drilldown" class="hidden mt-6 pt-4">
                        <div class="flex items-center justify-between mb-2">
                            <span id="drilldown-title"
                                class="text-xs font-bold text-slate-700 dark:text-slate-300">---</span>
                            <button id="close-drilldown"
                                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 rounded-full"><span
                                    class="material-symbols-outlined text-[16px]">close</span></button>
                        </div>
                        <div id="drilldown-chart" class="relative h-[120px] w-full"></div>
                        <div id="drilldown-labels"
                            class="relative h-5 mt-2 text-[10px] font-medium text-slate-400 dark:text-text-muted w-full">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ═══ BOTTOM NAVIGATION ═══ -->
    <nav
        class="fixed bottom-0 w-full z-40 bg-background-light dark:bg-surface-dark border-t border-slate-200 dark:border-white/5 pb-5 pt-3 px-6 h-[74px]">
        <div class="flex justify-between items-end max-w-md mx-auto">
            <a id="nav-home" href="#"
                class="flex flex-col items-center justify-center gap-1 min-w-[64px] group text-primary">
                <div class="flex items-center justify-center h-8 px-4 rounded-full bg-primary/20 transition-colors">
                    <span class="material-symbols-outlined text-primary text-[24px]"
                        style="font-variation-settings: 'FILL' 1;">home</span>
                </div>
                <span class="text-xs font-semibold text-slate-900 dark:text-white mt-1" data-i18n="home">سەرەتا</span>
            </a>
            <a id="nav-analytics" href="#"
                class="flex flex-col items-center justify-center gap-1 min-w-[64px] group text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                <div
                    class="flex items-center justify-center h-8 px-4 rounded-full transition-colors group-hover:bg-slate-200 dark:group-hover:bg-white/5">
                    <span class="material-symbols-outlined text-[24px]">monitoring</span>
                </div>
                <span class="text-xs font-medium mt-1" data-i18n="history">مێژوو</span>
            </a>
        </div>
    </nav>



    <!-- App JS (ES Module) -->
    <script type="module" src="/static/js/app.js"></script>


</body>

</html>
